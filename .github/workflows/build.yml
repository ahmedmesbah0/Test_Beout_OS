name: Beout_OS Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libssl-dev libsqlite3-dev

    - name: Clean stale build artifacts
      run: ./build.sh clean

    - name: Configure CMake
      run: ./build.sh configure
      
    - name: Build
      run: ./build.sh build
      
    - name: Test
      run: ./build.sh test

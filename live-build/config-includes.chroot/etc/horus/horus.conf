[beoutos]

APPLIANCE_NAME=BeoutOS
APPLIANCE_VERSION=1.0.0
APPLIANCE_CODENAME=atlas
APPLIANCE_VENDOR=Beout Security
APPLIANCE_SERIAL=UNPROVISIONED

BOOT_MODE=provisioning
BOOT_TARGET=beoutos-provisioning.target

CONFIG_PARTITION_DEVICE=/dev/disk/by-partlabel/BEOUTOS-CONFIG
CONFIG_PARTITION_MOUNT=/mnt/horus-config
CONFIG_PARTITION_FS=ext4
CONFIG_PARTITION_SIZE=512M

OVERLAY_ENABLED=yes
OVERLAY_LOWERDIR=/usr/lib/live/mount/rootfs.squashfs
OVERLAY_UPPERDIR=/mnt/horus-config/overlay/upper
OVERLAY_WORKDIR=/mnt/horus-config/overlay/work
OVERLAY_MOUNTPOINT=/usr/lib/live/mount/overlay

ROOTFS_READONLY=yes
ROOTFS_TYPE=squashfs
ROOTFS_COMPRESSION=xz

SERVICES_PROVISIONING_MODE=
SERVICES_ACTIVE_MODE=firewall,suricata,dnsmasq,nginx,openssh-server,wireguard,vpn-manager
SERVICES_STARTUP_ORDER=firewall,dnsmasq,suricata,wireguard,vpn-manager,nginx,openssh-server

LICENSE_SERVER_URL=https://license.beout.ai/api/v1
LICENSE_VALIDATION_INTERVAL=3600
LICENSE_GRACE_PERIOD=86400
LICENSE_OFFLINE_MODE=no

INTERFACE_ROLES_LAN=eth0
INTERFACE_ROLES_WAN=eth1
INTERFACE_ROLES_DMZ=eth2
INTERFACE_ROLES_MGMT=eth3
INTERFACE_ROLES_VLAN_PREFIX=eth0.

NETWORK_DHCP_SERVER_ENABLED=no
NETWORK_DNS_SERVER_ENABLED=no
NETWORK_NTP_SERVER_ENABLED=no
NETWORK_BRIDGE_ENABLED=no
NETWORK_VLAN_ENABLED=no

FIREWALL_DEFAULT_POLICY_LAN_IN=DROP
FIREWALL_DEFAULT_POLICY_WAN_IN=DROP
FIREWALL_DEFAULT_POLICY_LAN_OUT=ACCEPT
FIREWALL_DEFAULT_POLICY_WAN_OUT=ACCEPT
FIREWALL_DEFAULT_POLICY_FORWARD=DROP

SURICATA_ENABLED=no
SURICATA_RULES_UPDATE_INTERVAL=86400
SURICATA_RULES_SOURCE=emerging-threats
SURICATA_HOME_NET=192.168.1.0/24
SURICATA_EXTERNAL_NET=!$HOME_NET

VPN_OPENVPN_ENABLED=no
VPN_WIREGUARD_ENABLED=no
VPN_DEFAULT_PROTOCOL=wireguard

SSH_ENABLED=no
SSH_PORT=22
SSH_PERMIT_ROOT_LOGIN=no
SSH_PASSWORD_AUTHENTICATION=no
SSH_PUBLIC_KEY_AUTHENTICATION=yes

WEBUI_ENABLED=no
WEBUI_PORT=8443
WEBUI_SSL_CERT=/etc/horus/ssl/webui.crt
WEBUI_SSL_KEY=/etc/horus/ssl/webui.key
WEBUI_LISTEN_ADDRESS=0.0.0.0

TPM_ENABLED=no
TPM_DEVICE=/dev/tpm0
TPM_MEASURE_BOOT=yes
TPM_SEAL_CONFIG=yes

SECUREBOOT_ENABLED=yes
SECUREBOOT_SIGNING_KEY=/etc/horus/secureboot/db.key
SECUREBOOT_SIGNING_CERT=/etc/horus/secureboot/db.crt

LOG_LEVEL=info
LOG_ROTATION_INTERVAL=daily
LOG_RETENTION_DAYS=90
LOG_REMOTE_ENABLED=no
LOG_REMOTE_SERVER=
LOG_REMOTE_PORT=514
LOG_REMOTE_PROTOCOL=udp

SNMP_ENABLED=no
SNMP_COMMUNITY=public
SNMP_LISTEN_ADDRESS=127.0.0.1

HEALTH_CHECK_INTERVAL=60
HEALTH_CHECK_REPORT_ENABLED=no

AUTO_UPDATE_ENABLED=no
AUTO_UPDATE_CHANNEL=stable
AUTO_UPDATE_CHECK_INTERVAL=86400
AUTO_UPDATE_SCHEDULE=03:00

PROVISIONING_INTERFACE=tty1
PROVISIONING_SERIAL=ttyS0
PROVISIONING_SERIAL_SPEED=115200
PROVISIONING_BANNER_FILE=/etc/horus/security/banner
PROVISIONING_CLI_PATH=/usr/share/horus/provisioning/cli

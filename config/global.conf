# BeoutOS - Global Build Configuration
# ================================================
# This file is sourced by build.sh at build time.
# Modify values here to customize the build.

# --- Product Identity ---
BEOUTOS_VERSION=1.0.0
BEOUTOS_CODENAME=sentinel
BEOUTOS_VENDOR=Beout Security
BEOUTOS_PRODUCT=BeoutOS

# --- Debian Base ---
DEBIAN_BASE_VERSION=12
DEBIAN_MIRROR=http://deb.debian.org/debian/
DEBIAN_SECURITY_MIRROR=http://deb.debian.org/debian-security/

# --- Live-Build Configuration ---
LB_ARCHITECTURE=amd64
LB_DISTRIBUTION=bookworm
LB_ARCHIVE_AREAS=main contrib non-free-firmware
LB_SYSTEM=live
LB_CHROOT_FS=squashfs
LB_COMPRESSION=gzip
LB_USERNAME=admin
LB_HOSTNAME=beoutos

# --- Kernel ---
KERNEL_VERSION=6.1.0-17
KERNEL_FLAVOUR=amd64

# --- CMake ---
CMAKE_BUILD_TYPE=Release

# --- ISO ---
ISO_VOLUME_ID=BEOUTOS_1.0_SENTINEL
ISO_APPLICATION=BeoutOS 1.0.0
ISO_PUBLISHER=Beout Security; https://beout.ai; support@beout.ai

# --- Boot Parameters ---
BOOT_APPEND=boot=live components hostname=beoutos username=admin quiet systemd.unit=beoutos-boot.target

# --- Package Lists ---
PACKAGE_LIST_DIR=live-build/config-package-lists
PACKAGE_LIST_BASE=beoutos-base.list
PACKAGE_LIST_SECURITY=beoutos-security.list
PACKAGE_LIST_NETWORK=beoutos-network.list
PACKAGE_LIST_SYSTEM=beoutos-system.list

# --- Build Output ---
BUILD_OUTPUT_DIR=build
BUILD_LOG_DIR=build/logs
BUILD_BIN_DIR=build/bin

# --- Source ---
SRC_DIR=src
CMAKE_BUILD_DIR=build/cmake

# --- Live-Build Workspace ---
LB_DIR=live-build
LB_INCLUDES_DIR=live-build/config-includes.chroot
LB_HOOKS_DIR=live-build/config-hooks/live

# --- Installer ---
INSTALLER_DIR=installer

# --- Systemd ---
SYSTEMD_DIR=systemd

# --- Scripts ---
SCRIPTS_DIR=scripts
